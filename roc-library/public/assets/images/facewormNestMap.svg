<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="1000" fill="#2a2a2a"/>
  
  <!-- Floor areas -->
  <g id="dungeon-floor">
    <!-- Zone 1 - Top Left -->
    <rect x="50" y="50" width="350" height="300" fill="white" stroke="black" stroke-width="8"/>
    <text x="150" y="150" font-size="48" font-weight="bold" fill="green">1</text>
    
    <!-- Zone 2 - Top Middle -->
    <rect x="450" y="50" width="300" height="350" fill="white" stroke="black" stroke-width="8"/>
    <text x="550" y="200" font-size="48" font-weight="bold" fill="green">2</text>
    
    <!-- Zone 3 - Top Right -->
    <rect x="850" y="80" width="300" height="280" fill="white" stroke="black" stroke-width="8"/>
    <text x="950" y="200" font-size="48" font-weight="bold" fill="green">3</text>
    
    <!-- Zone 4 - Bottom Right -->
    <rect x="850" y="450" width="300" height="350" fill="white" stroke="black" stroke-width="8"/>
    <text x="950" y="600" font-size="48" font-weight="bold" fill="green">4</text>
    
    <!-- Zone 5 - Bottom Middle/Center -->
    <rect x="350" y="500" width="400" height="350" fill="white" stroke="black" stroke-width="8"/>
    <circle cx="550" cy="650" r="80" fill="#8B6B47" stroke="black" stroke-width="4"/>
    <text x="520" y="670" font-size="36" font-weight="bold" fill="white">5</text>
    
    <!-- Zone 2 Bottom - Bottom Left -->
    <rect x="50" y="450" width="250" height="350" fill="white" stroke="black" stroke-width="8"/>
    <text x="120" y="600" font-size="48" font-weight="bold" fill="green">2</text>
  </g>
  
  <!-- Walls -->
  <g id="walls" stroke="black" stroke-width="12" fill="none">
    <!-- Wall patterns -->
    <path d="M 400 100 L 430 130 L 400 160 L 430 190" stroke-width="6"/>
    <path d="M 800 150 L 830 170 L 800 200 L 830 230" stroke-width="6"/>
  </g>
</svg>